backend:
  name: github
  repo: mishraclark/rainbow-bloc-site

media_folder: /public/uploads
public_folder: /uploads

app_title: Rainbow Bloc Admin

collections:
  - name: zines
    label: Zines
    folder: /src/content/zines
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Name, name: name, widget: string }
      - label: Category
        name: category
        widget: string
      - label: Tags
        name: tags
        widget: list
        required: false
        field: { label: Tag, name: tag, widget: string }
      - { label: Preview Image, name: image, widget: image, required: false }
      - { label: File, name: file, widget: file }
      - { label: Description, name: description, widget: markdown, required: false }

  - name: whistles
    label: Whistles
    folder: /src/content/whistles
    create: true
    slug: "{{slug}}"
    media_folder: "/public/downloads/whistles"
    public_folder: "/downloads/whistles"
    fields:
      - { label: Name, name: name, widget: string }
      - { label: STL File, name: file, widget: file, hint: "Upload the .stl file" }
      - { label: Recommended, name: recommended, widget: boolean, default: false, hint: "Show as a recommended print" }
      - { label: Notes, name: notes, widget: markdown, required: false }
      - { label: Order, name: order, widget: number, required: false, default: 0 }

  - name: events
    label: Events
    folder: /src/content/events
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: Name, name: name, widget: string }
      - { label: Start, name: start, widget: datetime, format: "YYYY-MM-DDTHH:mm:ss.SSSZ" }
      - { label: End, name: end, widget: datetime, required: false, format: "YYYY-MM-DDTHH:mm:ss.SSSZ" }
      - { label: Location, name: location, widget: string, required: false }
      - { label: Address, name: address, widget: string, required: false }
      - { label: Link, name: link, widget: string, required: false }
      - { label: Image, name: image, widget: image, required: false }
      - { label: Description, name: description, widget: markdown, required: false }
